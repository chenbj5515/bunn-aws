name: Deploy Production

# 触发条件：
# 1) 推送到 main 自动触发
# 2) 在 GitHub Actions 页面手动触发（可传 image_tag）
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional custom image tag (defaults to commit SHA)"
        required: false
        type: string

permissions:
  # 允许读取仓库代码
  contents: read
  # 允许向 GHCR（GitHub Container Registry）推送镜像
  packages: write

jobs:
  deploy:
    # GitHub 提供的临时 Linux 机器
    runs-on: ubuntu-latest
    env:
      # 生产域名，可在仓库 Variables 里覆盖
      PROD_DOMAIN: ${{ vars.PROD_DOMAIN || 'bunn.ink' }}
      # VPS 上部署目录（脚本和 compose 文件会同步到这里）
      REMOTE_DIR: /opt/bunn-aws
    steps:
      - name: Checkout source (without marketplace action)
        env:
          # GITHUB_TOKEN 用于拉取当前 commit 代码
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 初始化一个最小 git 工作区并检出当前触发的 commit
          rm -rf .git
          git init .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD

      - name: Compute image tags
        id: tags
        run: |
          # 统一转小写，避免 GHCR 因大小写导致路径异常
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_BASE="ghcr.io/${OWNER_LC}/${REPO_LC}"

          # 手动触发时可指定自定义 tag；否则默认用 commit SHA
          TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -n "$TAG_INPUT" ]; then
            IMAGE_SHA="${IMAGE_BASE}:${TAG_INPUT}"
          else
            IMAGE_SHA="${IMAGE_BASE}:sha-${GITHUB_SHA}"
          fi

          # 同时维护 latest，方便应急或首发
          IMAGE_LATEST="${IMAGE_BASE}:latest"

          # 输出给后续步骤使用
          echo "image_sha=$IMAGE_SHA" >> "$GITHUB_OUTPUT"
          echo "image_latest=$IMAGE_LATEST" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          # 登录镜像仓库，后续 docker push 才有权限
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        env:
          DOCKER_BUILDKIT: "1"
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          # 使用仓库根目录 Dockerfile 构建镜像，并打两个标签（sha + latest）
          docker build \
            --build-arg NEXT_PUBLIC_BASE_URL="${NEXT_PUBLIC_BASE_URL}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL}" \
            --build-arg BETTER_AUTH_URL="${BETTER_AUTH_URL}" \
            --build-arg GITHUB_CLIENT_ID="${GITHUB_CLIENT_ID}" \
            --build-arg GITHUB_CLIENT_SECRET="${GITHUB_CLIENT_SECRET}" \
            --build-arg GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
            --build-arg GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}" \
            --secret id=BETTER_AUTH_SECRET,env=BETTER_AUTH_SECRET \
            --secret id=DATABASE_URL,env=DATABASE_URL \
            --secret id=STRIPE_SECRET_KEY,env=STRIPE_SECRET_KEY \
            --secret id=DEPLOY_GITHUB_TOKEN,env=DEPLOY_GITHUB_TOKEN \
            -t "${{ steps.tags.outputs.image_sha }}" \
            -t "${{ steps.tags.outputs.image_latest }}" \
            .
          # 推送到 GHCR，VPS 将从这里拉取新镜像
          docker push "${{ steps.tags.outputs.image_sha }}"
          docker push "${{ steps.tags.outputs.image_latest }}"

      - name: Setup SSH key
        env:
          # 用于连接 VPS 的私钥（放在 GitHub Secrets）
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          # 写入私钥并设置权限
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 预先记录服务器指纹，避免首次连接交互确认
          ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Generate .env.production for VPS
        env:
          # 所有需要同步到 VPS 的环境变量
          # PostgreSQL
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          # Auth
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # Stripe
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          STRIPE_PRICE_ID_ONE_MONTH_ACCESS: ${{ secrets.STRIPE_PRICE_ID_ONE_MONTH_ACCESS }}
          # GitHub API
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
          GITHUB_WORKFLOW_FILENAME: ${{ secrets.GITHUB_WORKFLOW_FILENAME }}
          # Upstash Redis
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Google APIs
          GOOGLE_VISION_API_KEY: ${{ secrets.GOOGLE_VISION_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # Vercel Blob
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          # Microsoft TTS
          PUBLIC_SUBSCRIPTION_KEY: ${{ secrets.PUBLIC_SUBSCRIPTION_KEY }}
          PUBLIC_REGION: ${{ secrets.PUBLIC_REGION }}
          NEXT_PUBLIC_SUBSCRIPTION_KEY: ${{ secrets.NEXT_PUBLIC_SUBSCRIPTION_KEY }}
          NEXT_PUBLIC_REGION: ${{ secrets.NEXT_PUBLIC_REGION }}
          # URLs
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          # Other
          DEEPAI_API_KEY: ${{ secrets.DEEPAI_API_KEY }}
          MIN_MAX_API_KEY: ${{ secrets.MIN_MAX_API_KEY }}
          NEXT_PUBLIC_CHROME_EXTENSION_ID: ${{ secrets.NEXT_PUBLIC_CHROME_EXTENSION_ID }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          # 生成运行时环境变量文件（每次部署完整覆盖，确保与 GitHub Secrets 同步）
          # 使用 shell 默认值语法处理未设置的变量
          cat > .env.production.generated << EOF
          # ===========================================
          # 生产环境变量（由 CI/CD 自动生成，请勿手动编辑）
          # ===========================================
          NODE_ENV=production

          # PostgreSQL
          POSTGRES_USER=${POSTGRES_USER:-postgres}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
          POSTGRES_DB=${POSTGRES_DB:-bunn_db}

          # Auth
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          BETTER_AUTH_URL=${BETTER_AUTH_URL}
          JWT_SECRET=${JWT_SECRET:-${BETTER_AUTH_SECRET}}
          GITHUB_CLIENT_ID=${AUTH_GITHUB_CLIENT_ID}
          GITHUB_CLIENT_SECRET=${AUTH_GITHUB_CLIENT_SECRET}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

          # Stripe
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
          STRIPE_PRICE_ID_ONE_MONTH_ACCESS=${STRIPE_PRICE_ID_ONE_MONTH_ACCESS}

          # GitHub API (for builds page)
          DEPLOY_GITHUB_TOKEN=${DEPLOY_GITHUB_TOKEN}
          GITHUB_OWNER=${GITHUB_OWNER:-chenbj5515}
          GITHUB_REPO=${GITHUB_REPO:-youtube-channel-banner-crawler}
          GITHUB_WORKFLOW_FILENAME=${GITHUB_WORKFLOW_FILENAME:-crawler.yml}

          # Upstash Redis
          UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
          UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}

          # OpenAI
          OPENAI_API_KEY=${OPENAI_API_KEY}

          # Google APIs
          GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
          GOOGLE_API_KEY=${GOOGLE_API_KEY}

          # Vercel Blob
          BLOB_READ_WRITE_TOKEN=${BLOB_READ_WRITE_TOKEN}

          # Microsoft TTS
          PUBLIC_SUBSCRIPTION_KEY=${PUBLIC_SUBSCRIPTION_KEY}
          PUBLIC_REGION=${PUBLIC_REGION:-eastasia}
          NEXT_PUBLIC_SUBSCRIPTION_KEY=${NEXT_PUBLIC_SUBSCRIPTION_KEY:-${PUBLIC_SUBSCRIPTION_KEY}}
          NEXT_PUBLIC_REGION=${NEXT_PUBLIC_REGION:-eastasia}

          # URLs
          NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://bunn.ink}
          NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://www.bunn.ink}
          API_BASE_URL=${API_BASE_URL:-https://bunn.ink}
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://bunn.ink}

          # Other
          DEEPAI_API_KEY=${DEEPAI_API_KEY}
          MIN_MAX_API_KEY=${MIN_MAX_API_KEY}
          NEXT_PUBLIC_CHROME_EXTENSION_ID=${NEXT_PUBLIC_CHROME_EXTENSION_ID:-lmepenbgdgfihjehjnanphnfhobclghl}
          LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@bunn.ink}
          EOF

      - name: Deploy image on VPS
        run: |
          # 1) 确保 VPS 目标目录存在
          ssh -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p ${REMOTE_DIR}/nginx/conf.d"
          # 2) 同步部署所需文件到 VPS
          scp -P "${{ secrets.VPS_PORT || 22 }}" deploy.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_DIR}/deploy.sh"
          scp -P "${{ secrets.VPS_PORT || 22 }}" docker-compose.prod.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_DIR}/docker-compose.prod.yml"
          scp -P "${{ secrets.VPS_PORT || 22 }}" nginx/nginx.conf "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_DIR}/nginx/nginx.conf"
          scp -P "${{ secrets.VPS_PORT || 22 }}" nginx/conf.d/app.conf.template "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_DIR}/nginx/conf.d/app.conf.template"
          scp -P "${{ secrets.VPS_PORT || 22 }}" nginx/conf.d/app.bootstrap.conf.template "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_DIR}/nginx/conf.d/app.bootstrap.conf.template"
          # 3) 同步 .env.production 文件到 VPS（完整覆盖，确保与 GitHub Secrets 同步）
          scp -P "${{ secrets.VPS_PORT || 22 }}" .env.production.generated "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_DIR}/.env.production"
          # 4) 授权脚本执行权限
          ssh -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "chmod +x ${REMOTE_DIR}/deploy.sh"
          # 5) 远程执行 deploy.sh，传入域名和本次镜像
          ssh -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd ${REMOTE_DIR} && ./deploy.sh deploy --domain ${PROD_DOMAIN} --image ${{ steps.tags.outputs.image_sha }}"
