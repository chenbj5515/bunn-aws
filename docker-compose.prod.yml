# ===========================================
# 生产环境 Docker Compose 配置
# 包含: PostgreSQL + Redis + Next.js + Nginx + 自动 SSL
# 使用: docker compose -f docker-compose.prod.yml up -d
# ===========================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: bunn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env.production 中设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bunn_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bunn_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bunn-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: bunn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bunn-network

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bunn-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bunn_db}
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bunn-network
    # 不对外暴露端口，通过 Nginx 访问

  # Nginx 反向代理（Cloudflare 模式，SSL 由 Cloudflare 处理）
  nginx:
    image: nginx:alpine
    container_name: bunn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
    networks:
      - bunn-network

volumes:
  postgres_data:
  redis_data:

networks:
  bunn-network:
    driver: bridge
