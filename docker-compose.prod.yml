# ===========================================
# 生产环境 Docker Compose 配置
# 包含: PostgreSQL + Redis + Next.js + Nginx + Let's Encrypt
# 使用: docker compose -f docker-compose.prod.yml up -d
# ===========================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: bunn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env.production 中设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bunn_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bunn_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bunn-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: bunn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bunn-network

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bunn-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bunn_db}
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bunn-network
    # 不对外暴露端口，通过 Nginx 访问

  # Nginx 反向代理（80/443）
  nginx:
    image: nginx:alpine
    container_name: bunn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - app
    networks:
      - bunn-network

  # Let's Encrypt 证书续期（后台循环）
  certbot:
    image: certbot/certbot:latest
    container_name: bunn-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $$!; done"

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  certbot_www:

networks:
  bunn-network:
    driver: bridge
